        const hours = Array.from({ length: 27 }, (_, i) => 8 + i * 0.5); // 08:00 - 21:00 arası yarım saatlik dilimler

        function App() {
          const [selectedUsers, setSelectedUsers] = useState([teamData[0].id]);
          const [viewMode, setViewMode] = useState('individual');

          const toggleUser = (id) => {
            if (selectedUsers.includes(id)) {
              if (selectedUsers.length > 1) {
                setSelectedUsers(selectedUsers.filter(u => u !== id));
              }
            } else {
              setSelectedUsers([...selectedUsers, id]);
            }
          };

          const selectAll = () => setSelectedUsers(teamData.map(u => u.id));
          const clearAll = () => setSelectedUsers([teamData[0].id]);

          const generateOverlapMap = () => {
            const map = {};
            days.forEach((_, dayIdx) => {
              map[dayIdx] = {};
              hours.forEach(hour => {
                let busyCount = 0;
                let busyUsers = [];
                
                teamData.forEach(user => {
                  if (selectedUsers.includes(user.id)) {
                    const isBusy = user.schedule.some(s => s.day === dayIdx && hour >= s.start && hour < s.end);
                    if (isBusy) {
                      busyCount++;
                      busyUsers.push(user.name.split(' ')[0]);
                    }
                  }
                });

                map[dayIdx][hour] = {
                  busyCount,
                  totalSelected: selectedUsers.length,
                  busyUsers
                };
              });
            });
            return map;
          };

          const overlapMap = useMemo(() => generateOverlapMap(), [selectedUsers]);

          const formatTime = (time) => {
            const h = Math.floor(time);
            const m = (time % 1) * 60;
            return `${h.toString().padStart(2, '0')}:${m === 0 ? '00' : '30'}`;
          };

          const getHeatmapColor = (busyCount, total) => {
            if (total === 0) return 'bg-gray-100';
            if (busyCount === 0) return 'bg-green-100 border-green-200 hover:bg-green-200';
            if (busyCount === total) return 'bg-red-100 border-red-200 hover:bg-red-200';
            
            const ratio = busyCount / total;
            if (ratio < 0.5) return 'bg-yellow-100 border-yellow-200 hover:bg-yellow-200';
            return 'bg-orange-100 border-orange-200 hover:bg-orange-200';
          };

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-800">
              {/* Sol Panel */}
              <div className="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-screen shadow-sm z-10 shrink-0">

                  <div className="flex items-center gap-3 mb-2">
                    <IconCalendar className="w-6 h-6 text-blue-400" />
                    <h1 className="text-xl font-bold">Ekip Hub</h1>

                  <p className="text-slate-300 text-sm">Ders Programları & Müsaitlik</p>
                </div>

                <div className="p-4 border-b border-slate-100 flex flex-col gap-2">
                  <div className="flex bg-slate-100 p-1 rounded-lg">
                    <button 
                      onClick={() => { setViewMode('individual'); setSelectedUsers([teamData[0].id]); }}
                      className={`flex-1 py-2 text-sm font-medium rounded-md transition-all ${viewMode === 'individual' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      Kişisel Görünüm
                    </button>
                    <button 
                      onClick={() => { setViewMode('overlap'); selectAll(); }}
                      className={`flex-1 py-2 text-sm font-medium rounded-md transition-all ${viewMode === 'overlap' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      Ortak Müsaitlik
                    </button>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-4">
                  <div className="flex items-center justify-between mb-4">
                    <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                      <IconUsers className="w-4 h-4" /> Ekip Üyeleri
                    </h2>
                    {viewMode === 'overlap' && (
                      <button onClick={selectedUsers.length === teamData.length ? clearAll : selectAll} className="text-xs text-blue-600 font-medium hover:underline">
                        {selectedUsers.length === teamData.length ? 'Temizle' : 'Tümünü Seç'}
                      </button>
                    )}
                  </div>

                  <div className="space-y-2">
                    {teamData.map(user => (
                      <div 
                        key={user.id}
                        onClick={() => viewMode === 'overlap' ? toggleUser(user.id) : setSelectedUsers([user.id])}
                        className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all border ${
                          selectedUsers.includes(user.id) 
                            ? `border-${user.color.split('-')[1]}-200 bg-${user.color.split('-')[1]}-50 ring-1 ring-${user.color.split('-')[1]}-400` 
                            : 'border-slate-100 hover:bg-slate-50 hover:border-slate-200'
                        }`}
                      >
                        {viewMode === 'overlap' ? (
                          selectedUsers.includes(user.id) ? 
                            <IconCheckSquare className={`w-5 h-5 text-${user.color.split('-')[1]}-500`} /> : 
                            <IconSquare className="w-5 h-5 text-slate-300" />
                        ) : (
                          <div className={`w-8 h-8 rounded-full ${user.color} text-white flex items-center justify-center font-bold text-xs`}>
                            {user.name.split(' ').map(n => n[0]).join('').substring(0,2)}
                          </div>
                        )}
                        
                        <div className="flex-1 min-w-0">

                          )}
                        </div>
                      </div>
                    ))}

              {/* Sağ Panel */}
              <div className="flex-1 flex flex-col h-screen overflow-hidden">

                        "Ortak Boş Vakit Bulucu"
                      )}
                    </h2>
                    <p className="text-slate-500 mt-1">
                      {viewMode === 'individual' 
                        ? "Seçili kişinin haftalık rutini." 
                        : `${selectedUsers.length} kişi seçildi. Toplantı veya çalışma için yeşil alanları tercih edin.`}
                    </p>
                  </div>

                  {viewMode === 'overlap' && (
                    <div className="flex gap-4 text-xs font-medium bg-slate-50 p-2 md:p-3 rounded-lg border border-slate-100 flex-wrap">
                      <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-green-400"></div>Herkes Müsait</div>
                      <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-yellow-400"></div>Birkaçı Dolu</div>
                      <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-red-400"></div>Herkes Dolu</div>
                    </div>
                  )}

                      <div className="p-3 border-r border-slate-200 flex items-center justify-center text-slate-400 bg-slate-50">

                    <div className="relative" style={{ height: `${(hours.length - 1) * 40}px` }}>
                      {hours.slice(0, -1).map((hour, i) => (
                        <div key={i} className="absolute w-full grid grid-cols-6 border-b border-slate-100" style={{ top: `${i * 40}px`, height: '40px' }}>
                          <div className="border-r border-slate-200 text-xs text-slate-400 flex items-start justify-center pt-1 bg-white z-10">
                            {Number.isInteger(hour) ? formatTime(hour) : ''}
                          </div>
                          {days.map((_, dayIdx) => (
                            <div key={dayIdx} className="border-r border-slate-100 border-dashed last:border-0 relative group">

                                {formatTime(hour)}
                              </div>
                            </div>
                          ))}
                        </div>
                      ))}

                      {viewMode === 'individual' && selectedUsers.length === 1 && teamData.find(u => u.id === selectedUsers[0]).schedule.map((slot, idx) => {
                        const activeUser = teamData.find(u => u.id === selectedUsers[0]);
                        const top = (slot.start - 8) * 80;
                        const height = (slot.end - slot.start) * 80;
                        
                        return (
                          <div 
                            key={idx}
                            className={`absolute p-2 rounded-lg border shadow-sm flex flex-col justify-between overflow-hidden transition-all hover:scale-[1.02] z-20 ${activeUser.color} bg-opacity-90 border-white text-white left-[calc(16.66%*${slot.day + 1}+6px)] w-[calc(16.66%-12px)]`}
                            style={{ top: `${top}px`, height: `${height}px` }}
                          >
                            <span className="font-semibold text-sm leading-tight">{slot.title}</span>
                            <span className="text-xs font-medium opacity-80 mt-auto">{formatTime(slot.start)} - {formatTime(slot.end)}</span>
                          </div>
                        )
                      })}

                      {viewMode === 'overlap' && days.map((_, dayIdx) => (
                        hours.slice(0, -1).map((hour, hourIdx) => {
                          const data = overlapMap[dayIdx][hour];
                          const top = hourIdx * 40;
                          
                          if (data.totalSelected === 0) return null;

                          return (
                            <div 
                              key={`${dayIdx}-${hourIdx}`}
                              className={`absolute left-[calc(16.66%*${dayIdx + 1})] w-[16.66%] border border-white/50 transition-colors group ${getHeatmapColor(data.busyCount, data.totalSelected)}`}
                              style={{ top: `${top}px`, height: '40px' }}
                            >
                              {data.busyCount > 0 && data.busyCount < data.totalSelected && (
                                <div className="hidden group-hover:block absolute z-30 bg-slate-800 text-white text-xs p-2 rounded shadow-lg -top-8 left-1/2 -translate-x-1/2 whitespace-nowrap">
                                  Meşgul: {data.busyUsers.join(', ')}
                                </div>
                              )}
                              
                              {data.busyCount === data.totalSelected && data.totalSelected > 0 && (
                                <div className="w-full h-full flex items-center justify-center opacity-30 text-red-700">
                                   <IconUsers className="w-4 h-4" />
                                </div>
                              )}

                               {data.busyCount === 0 && data.totalSelected > 0 && (
                                <div className="w-full h-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-green-700 font-bold text-xs">
                                   Müsait
                                </div>
                              )}
                            </div>
                          );
                        })
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
